services:
  - type: web
    name: house-finder-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn house_finder.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://yourfrontend.onrender.com,http://localhost:19006
      - key: DATABASE_URL
        fromDatabase:
          name: house-finder-db
          property: connectionString
      - key: CHAPA_SECRET_KEY
        sync: false   # you'll set this manually in Render dashboard

databases:
  - name: house-finder-db
    plan: free